name: mu
description: "Mu"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_tts: ^3.8.3
  intl: ^0.19.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.2.1
  speech_to_text: ^7.0.0
  cupertino_icons: ^1.0.8
  video_player: ^2.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mainimg.jpg
    - assets/box.jpg
    - assets/empty.jpg
    - assets/fill.jpg
    - assets/motion.gif
    - assets/gradient.png
    - assets/loadingvideo.mp4
    - assets/still.png
    - assets/boximage.png
    - .env